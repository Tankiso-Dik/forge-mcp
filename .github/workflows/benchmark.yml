name: Benchmark

on:
  workflow_dispatch:
  pull_request:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Project checks
        run: npm run check:all

      - name: Run benchmark suite against pinned baseline
        run: npm run bench:ci

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forge-benchmark-artifacts
          path: |
            benchmarks/reports/*.json
            benchmarks/reports/*.md
            benchmarks/logs/*.log
